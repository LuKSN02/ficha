<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>S.I.G.O. - Sistema de Gestão da Ordem</title>

    <!-- INÍCIO DO CÓDIGO DE REDIRECIONAMENTO -->
    <script>
        if (window.innerWidth <= 800 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            window.location.href = "mobile.html"; 
        }
    </script>
    <!-- FIM DO CÓDIGO DE REDIRECIONAMENTO -->

    <style>
        @import url('https://fonts.googleapis.com');
        :root { --sangue: #8b0000; --fundo: #0a0a0a; --texto: #d1d1d1; --borda: #333; --ouro: #ffd700; --oculto: #4b0082; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--fundo); color: var(--texto); font-family: 'Special Elite', monospace; padding-bottom: 50px; }
        
        #tela-login { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); }
        #dashboard { display: none; padding: 20px; }
        
        .container-ficha { max-width: 1050px; margin: 0 auto; background: #121212; border: 1px solid var(--sangue); padding: 30px; box-shadow: 0 0 50px #000; display: grid; grid-template-columns: 1fr 380px; gap: 25px; }

        .secao { border: 1px solid var(--borda); padding: 15px; margin-top: 20px; background: #0d0d0d; }
        h3 { color: var(--sangue); border-bottom: 1px solid var(--borda); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;}

        label { display: block; font-size: 0.65rem; color: var(--sangue); margin-bottom: 3px; text-transform: uppercase; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid var(--borda); color: #fff; padding: 8px; font-family: inherit; margin-bottom: 10px; }
        
        /* HEADER COM FOTO */
        .header-agente { display: flex; gap: 20px; align-items: flex-end; margin-bottom: 10px; }
        .retrato-container { 
            width: 120px; height: 120px; border: 2px solid var(--sangue); 
            border-radius: 50%; overflow: hidden; background: #050505; 
            flex-shrink: 0; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.3);
        }
        .retrato-container:hover { border-color: var(--ouro); }
        .retrato-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .info-basica { flex-grow: 1; }

        .info-origem { font-size: 0.7rem; color: var(--ouro); margin-bottom: 15px; font-style: italic; border-left: 2px solid var(--sangue); padding-left: 10px; min-height: 18px;}

        .grid-atributos { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 15px; }
        .atrib-box { text-align: center; border: 1px solid var(--borda); padding: 5px; cursor: pointer; transition: 0.2s; position: relative; }
        .atrib-box:hover { border-color: var(--ouro); background: #1a1a1a; }
        .atrib-val { font-size: 1.6rem; border: none; border-bottom: 2px solid var(--sangue); text-align: center; background: transparent; width: 100%; color: white; cursor: text; position: relative; z-index: 2;}

        .status-box { background: #000; padding: 15px; border: 1px dashed var(--sangue); margin: 15px 0; }
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .status-header b { color: var(--sangue); font-size: 1.2rem; }
        
        .barra-fundo { background: #1a1a1a; height: 8px; width: 100%; border-radius: 4px; overflow: hidden; margin: 4px 0; }
        .barra-progresso { height: 100%; width: 100%; transition: width 0.3s ease; }
        .barra-pv { background: #8b0000; }
        .barra-pe { background: #ffd700; }
        .barra-san { background: #4b0082; }

        .grid-check { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .grid-pericia { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .check-item { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; color: #aaa; cursor: pointer; }
        .check-item input { width: auto; margin: 0; }

        .defesa-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .defesa-card { background: #151515; padding: 10px; text-align: center; border: 1px solid var(--borda); }
        .defesa-card b { display: block; font-size: 1.3rem; color: var(--ouro); }

        #lista-personagens { margin-bottom: 20px; border-bottom: 2px solid var(--sangue); padding-bottom: 10px; display: flex; gap: 10px; overflow-x: auto; grid-column: 1 / span 2; }
        .btn-personagem { background: #1a1a1a; color: #666; border: 1px solid #333; padding: 6px 16px; cursor: pointer; white-space: nowrap; font-size: 0.8rem; }
        .btn-personagem.ativo { border-color: var(--sangue); color: var(--sangue); background: #200000; }

        button { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--sangue); color: var(--sangue); font-family: inherit; cursor: pointer; text-transform: uppercase; margin-top: 5px; font-size: 0.7rem; }
        button:hover { background: var(--sangue); color: white; }
        
        .val-dado { display: block; font-size: 2.5rem; color: var(--ouro); font-weight: bold; text-align: center; }
        .btn-status { width: 22px; height: 22px; padding: 0; margin: 0 2px; }
        
        .arma-row { display: grid; grid-template-columns: 2fr 1fr 1fr 30px; gap: 5px; margin-bottom: 5px; }
        .btn-dano { background: var(--sangue) !important; color: white !important; padding: 4px !important; font-size: 0.6rem !important; }
        .item-row { display: grid; grid-template-columns: 3fr 1fr 30px; gap: 5px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <section id="tela-login">
        <div style="background: #121212; padding: 40px; border: 1px solid var(--borda); border-top: 4px solid var(--sangue); text-align: center; width: 350px;">
            <h2 style="color: var(--sangue);">ORDO REALITAS</h2>
            <p style="font-size: 0.6rem; letter-spacing: 2px; margin-bottom: 20px; color: #555;">SISTEMA DE GESTÃO V2.5</p>
            <input type="text" id="user" placeholder="NOME DE AGENTE">
            <button onclick="fazerLogin()">Acessar Terminal</button>
        </div>
    </section>

    <section id="dashboard">
        <div class="container-ficha">
            <div id="lista-personagens"></div>
            
            <div class="coluna-principal">
                <div class="header-agente">
                    <div class="retrato-container" onclick="mudarFoto()" title="Clique para mudar a foto">
                        <img id="img-retrato" src="https://i.imgur.com" class="retrato-img">
                    </div>
                    <div class="info-basica">
                        <div style="display: flex; gap: 15px;">
                            <div style="flex: 2;"><label>Agente</label><input type="text" id="nome-agente" oninput="salvarDados()"></div>
                            <div style="flex: 1;"><label>NEX %</label><input type="number" id="nex" value="5" step="5" onchange="atualizarTudo()"></div>
                        </div>
                        <div style="display: flex; gap: 15px;">
                            <div style="flex: 1;"><label>Classe</label><select id="classe" onchange="atualizarTudo()"><option value="combatente">Combatente</option><option value="especialista">Especialista</option><option value="ocultista">Ocultista</option></select></div>
                            <div style="flex: 1;"><label>Trilha</label><select id="trilha" onchange="salvarDados()"></select></div>
                        </div>
                    </div>
                </div>

                <label>Origem</label>
                <select id="origem" onchange="atualizarOrigem()">
                    <option value="">Selecione...</option>
                    <option value="academico">Acadêmico</option><option value="agente-saude">Agente de Saúde</option><option value="amnesico">Amnésico</option><option value="artista">Artista</option><option value="atleta">Atleta</option><option value="chef">Chef</option><option value="criminoso">Criminoso</option><option value="cultista-arrependido">Cultista Arrependido</option><option value="desgarrado">Desgarrado</option><option value="executivo">Executivo</option><option value="investigador">Investigador</option><option value="lutador">Lutador</option><option value="magnata">Magnata</option><option value="mercenario">Mercenário</option><option value="militar">Militar</option><option value="operario">Operário</option><option value="policial">Policial</option><option value="religioso">Religioso</option><option value="servidor-publico">Servidor Público</option><option value="teorico-conspiracao">Teórico da Conspiração</option><option value="ti-agente">T.I.</option><option value="vitima">Vítima</option>
                </select>
                <div id="desc-origem" class="info-origem">Escolha uma origem.</div>

                <div class="grid-atributos">
                    <div class="atrib-box" onclick="rolarTeste('FOR')"><label>FOR</label><input type="number" class="atrib-val" id="for" value="1" onclick="event.stopPropagation()" onchange="atualizarTudo()"></div>
                    <div class="atrib-box" onclick="rolarTeste('AGI')"><label>AGI</label><input type="number" class="atrib-val" id="agi" value="1" onclick="event.stopPropagation()" onchange="atualizarTudo()"></div>
                    <div class="atrib-box" onclick="rolarTeste('INT')"><label>INT</label><input type="number" class="atrib-val" id="int" value="1" onclick="event.stopPropagation()" onchange="atualizarTudo()"></div>
                    <div class="atrib-box" onclick="rolarTeste('VIG')"><label>VIG</label><input type="number" class="atrib-val" id="vig" value="1" onclick="event.stopPropagation()" onchange="atualizarTudo()"></div>
                    <div class="atrib-box" onclick="rolarTeste('PRE')"><label>PRE</label><input type="number" class="atrib-val" id="pre" value="1" onclick="event.stopPropagation()" onchange="atualizarTudo()"></div>
                </div>

                <div class="defesa-box">
                    <div class="defesa-card"><label>Defesa</label><b id="defesa-val">10</b><small>10+AGI+ <input type="number" id="bonus-def" value="0" style="width:30px; margin:0; padding:2px;" onchange="atualizarTudo()"> Bônus</small></div>
                    <div class="defesa-card"><label>Esquiva</label><b id="esquiva-val">10</b><small>Defesa + Reflexos</small></div>
                </div>

                <div class="secao">
                    <h3>Arsenal <button onclick="addArma()" style="width:auto; padding:2px 10px; margin:0; font-size:0.6rem;">+ Arma</button></h3>
                    <div id="armas-container"></div>
                </div>

                <div class="secao">
                    <h3>Condições</h3>
                    <div id="lista-condicoes" class="grid-check"></div>
                </div>

                <div class="secao">
                    <h3>Perícias (<span id="count-pericias">0</span>)</h3>
                    <div id="lista-pericias" class="grid-pericia"></div>
                </div>
            </div>

            <div class="coluna-lateral">
                <div class="secao">
                    <h3>Status Vitais</h3>
                    <div class="status-box">
                        <div class="status-item">
                            <div class="status-header"><label>PV</label><div><button onclick="altStatus('pv',-1)" class="btn-status">-</button> <b id="res-pv">0</b> <button onclick="altStatus('pv',1)" class="btn-status">+</button></div></div>
                            <div class="barra-fundo"><div id="bar-pv" class="barra-progresso barra-pv"></div></div>
                            <small>MÁX: <span id="max-pv">0</span></small>
                        </div>
                        <div class="status-item">
                            <div class="status-header"><label>PE</label><div><button onclick="altStatus('pe',-1)" class="btn-status">-</button> <b id="res-pe">0</b> <button onclick="altStatus('pe',1)" class="btn-status">+</button></div></div>
                            <div class="barra-fundo"><div id="bar-pe" class="barra-progresso barra-pe"></div></div>
                            <small>MÁX: <span id="max-pe">0</span></small>
                        </div>
                        <div class="status-item">
                            <div class="status-header"><label>SAN</label><div><button onclick="altStatus('san',-1)" class="btn-status">-</button> <b id="res-san">0</b> <button onclick="altStatus('san',1)" class="btn-status">+</button></div></div>
                            <div class="barra-fundo"><div id="bar-san" class="barra-progresso barra-san"></div></div>
                            <small>MÁX: <span id="max-san">0</span></small>
                        </div>
                    </div>
                    <button onclick="descanso('longo')" style="border-color: var(--ouro); color: var(--ouro);">Descanso Longo</button>
                    <button onclick="descanso('curto')" style="font-size: 0.6rem; color: #777; border-color: #444;">Descanso Curto</button>
                </div>

                <div class="secao">
                    <h3>Dados</h3>
                    <div style="background: #000; padding: 10px; border: 1px solid var(--borda);">
                        <div id="log-dados" style="font-size: 0.55rem; color: #555; text-align: center; margin-bottom: 4px;">AGUARDANDO...</div>
                        <div id="resultado-dado" class="val-dado">0</div>
                    </div>
                    <div style="display: flex; gap: 4px;">
                        <button onclick="rolarD(20)">D20</button><button onclick="rolarD(6)">D6</button><button onclick="rolarD(10)">D10</button>
                    </div>
                </div>

                <div id="secao-rituais" class="secao" style="border-color: var(--oculto);">
                    <h3 style="color: #9932cc; border-color: var(--oculto);">Rituais (<span id="circulo-max">1º</span> Círculo)</h3>
                    <textarea id="txt-rituais" style="height: 100px; background: #05000a; color: #e0b0ff;" oninput="salvarDados()"></textarea>
                </div>

                <div class="secao">
                    <h3>Mochila</h3>
                    <div id="itens-container"></div>
                    <button onclick="addItem()" style="font-size: 0.6rem;">+ Item</button>
                    <div style="text-align: right; font-size: 0.7rem; color: var(--ouro); margin-top: 8px;">CARGA: <span id="carga-atual">0</span>/<span id="carga-max">0</span></div>
                </div>

                <div class="secao">
                    <h3>Anotações</h3>
                    <textarea id="txt-anotacoes" style="height: 100px; font-size: 0.7rem;" oninput="salvarDados()"></textarea>
                </div>

                <button onclick="novoAgente()" style="color: #444; border-color: #222; font-size: 0.6rem;">+ Novo Agente</button>
                <button onclick="deletarAtual()" style="color: #300; border-color: #300; font-size: 0.6rem;">Remover Agente</button>
            </div>
        </div>
    </section>

    <script>
        const COND = ["Machucado", "Ferido Grave", "Sangrando", "Morrendo", "Inconsciente", "Atordoado", "Abalado", "Enlouquecendo", "Fraco", "Debilitado", "Paralisado", "Envenenado"];
        const PERI = ["Acrobacia", "Adestramento", "Artes", "Atletismo", "Atualidades", "Crime", "Diplomacia", "Enganação", "Fortitude", "Furtividade", "Iniciativa", "Intimidação", "Intuição", "Investigação", "Luta", "Medicina", "Ocultismo", "Percepção", "Pilotagem", "Pontaria", "Profissão", "Reflexos", "Religião", "Sobrevivência", "Tática", "Tecnologia", "Vontade"];
        const ORIGENS_DB = { academico: "Saber é Poder: +2 em testes de Intelecto.", "agente-saude": "Medicina livre p/ curar 1d6 PV.", amnesico: "Resistência mental e +2 Vontade.", artista: "+5 Diplomacia com fãs.", atleta: "+2 Atletismo e +1 Defesa.", chef: "Descanso Curto: +1d6 PV aliados.", criminoso: "+2 Crime e Furtividade.", "cultista-arrependido": "Resistência paranormal, -10 SAN.", desgarrado: "+1 PV p/ NEX.", executivo: "Item categoria maior 1x/missão.", investigador: "+2 Investigação e Percepção.", lutador: "Ataque desarmado +1d4 dano.", magnata: "+5 prestígio inicial.", mercenario: "+2 Iniciativa e Reflexos.", militar: "+2 Pontaria.", operario: "+2 ataque arma simples.", policial: "+2 Intimidação e +1 Defesa.", religioso: "Religião recupera Sanidade.", "servidor-publico": "+2 Vontade contra medo.", "teorico-conspiracao": "+2 Ocultismo e Investigação.", "ti-agente": "+2 Tecnologia.", vitima: "+1 Vontade e Fortitude." };
        const TRILHAS = { combatente: ["Aniquilador", "Comandante", "Guerreiro", "Op. Especiais", "Tropa de Choque"], especialista: ["Atirador Elite", "Infiltrador", "Médico Campo", "Negociador", "Técnico"], ocultista: ["Conduíte", "Flagelador", "Graduado", "Lâmina", "Intuitivo"] };

        let personagens = JSON.parse(localStorage.getItem('ordem_fichas')) || [];
        let indexAtual = 0;

        function fazerLogin() {
            if(document.getElementById('user').value) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                gerarGrades();
                if(personagens.length === 0) novoAgente();
                else carregarAgente(0);
            }
        }

        function gerarGrades() {
            document.getElementById('lista-condicoes').innerHTML = COND.map(c => `<label class="check-item"><input type="checkbox" class="chk-cond" data-nome="${c}" onchange="salvarDados()"> ${c}</label>`).join('');
            document.getElementById('lista-pericias').innerHTML = PERI.map(p => `<label class="check-item"><input type="checkbox" class="chk-per" data-nome="${p}" onchange="atualizarTudo()"> ${p}</label>`).join('');
        }

        function mudarFoto() {
            const url = prompt("Cole o link da imagem do seu personagem:");
            if(url) { document.getElementById('img-retrato').src = url; salvarDados(); }
        }

        function atualizarTudo() {
            if(!personagens[indexAtual]) return;
            const n = parseInt(document.getElementById('nex').value) || 5;
            const c = document.getElementById('classe').value;
            const a = parseInt(document.getElementById('agi').value) || 0;
            const v = parseInt(document.getElementById('vig').value) || 0;
            const p = parseInt(document.getElementById('pre').value) || 0;
            const f = parseInt(document.getElementById('for').value) || 0;
            const b = parseInt(document.getElementById('bonus-def').value) || 0;

            const selT = document.getElementById('trilha');
            const salva = personagens[indexAtual].trilha;
            if(n < 10) { selT.disabled = true; selT.innerHTML = "<option>Bloqueado</option>"; }
            else { selT.disabled = false; selT.innerHTML = TRILHAS[c].map(t => `<option value="${t}" ${t === salva ? 'selected' : ''}>${t}</option>`).join(''); }

            document.getElementById('defesa-val').innerText = 10 + a + b;
            const ref = Array.from(document.querySelectorAll('.chk-per:checked')).some(x => x.dataset.nome === "Reflexos") ? 5 : 0;
            document.getElementById('esquiva-val').innerText = 10 + a + b + ref;

            // Título do Círculo máximo (dinâmico)
            document.getElementById('circulo-max').innerText = n>=85?"4º":n>=65?"3º":n>=35?"2º":"1º";

            const av = Math.floor((n - 5) / 5);
            let pB, pN, eB, eN, sB, sN;
            if (c === 'combatente') { pB=20+v; pN=4+v; eB=2+p; eN=2+p; sB=12; sN=3; }
            else if (c === 'especialista') { pB=16+v; pN=3+v; eB=3+p; eN=3+p; sB=16; sN=4; }
            else { pB=12+v; pN=2+v; eB=4+p; eN=4+p; sB=20; sN=5; }
            document.getElementById('max-pv').innerText = pB + (pN * av);
            document.getElementById('max-pe').innerText = eB + (eN * av);
            document.getElementById('max-san').innerText = sB + (sN * av);
            document.getElementById('count-pericias').innerText = (c === 'especialista' ? 7 : 3) + (parseInt(document.getElementById('int').value) || 0);

            let cAt = 0; document.querySelectorAll('.item-w').forEach(i => cAt += parseInt(i.value) || 0);
            const cMax = 5 + (f * 5);
            document.getElementById('carga-atual').innerText = cAt;
            document.getElementById('carga-max').innerText = cMax;
            document.getElementById('carga-atual').style.color = cAt > cMax ? "red" : "var(--ouro)";
            
            atualizarBarras(); salvarDados();
        }

        function atualizarBarras() {
            ['pv', 'pe', 'san'].forEach(t => {
                const a = parseInt(document.getElementById(`res-${t}`).innerText) || 0;
                const m = parseInt(document.getElementById(`max-${t}`).innerText) || 1;
                document.getElementById(`bar-${t}`).style.width = Math.min(100, Math.max(0, (a/m)*100)) + "%";
            });
        }

        function altStatus(t, v) {
            const s = document.getElementById(`res-${t}`);
            const m = parseInt(document.getElementById(`max-${t}`).innerText);
            s.innerText = Math.max(0, Math.min(m, (parseInt(s.innerText) || 0) + v));
            atualizarBarras(); salvarDados();
        }

        function addArma(nome = "", teste = "", dano = "DANO") {
            const container = document.getElementById('armas-container');
            const div = document.createElement('div'); div.className = "arma-row";
            div.innerHTML = `<input type="text" placeholder="Arma" value="${nome}" oninput="salvarDados()"><input type="text" placeholder="Atrib" value="${teste}" oninput="salvarDados()"><button class="btn-dano" onclick="rolarDano(this)">${dano}</button><button onclick="this.parentElement.remove(); salvarDados()" style="color:red; border:none; background:transparent; cursor:pointer;">X</button>`;
            container.appendChild(div);
            salvarDados();
        }

        function rolarDano(btn) {
            let formula = btn.innerText === 'DANO' ? prompt("Fórmula (ex: 2d6+4):") : btn.innerText;
            if(!formula) return; btn.innerText = formula;
            const match = formula.toLowerCase().match(/(\d+)d(\d+)\+?(\d+)?/);
            if(match) {
                let total = 0, qtd = parseInt(match[1]), lados = parseInt(match[2]), bonus = parseInt(match[3] || 0);
                for(let i=0; i<qtd; i++) total += Math.floor(Math.random()*lados)+1;
                document.getElementById('log-dados').innerText = `DANO (${formula}):`;
                document.getElementById('resultado-dado').innerText = total + bonus;
                salvarDados();
            }
        }

        function addItem(n = "", w = 1) {
            const div = document.createElement('div'); div.className = "item-row";
            div.innerHTML = `<input type="text" placeholder="Item" value="${n}" oninput="salvarDados()"><input type="number" value="${w}" class="item-w" onchange="atualizarTudo()"><button onclick="this.parentElement.remove(); atualizarTudo()" style="color:red; border:none; background:transparent; cursor:pointer;">X</button>`;
            document.getElementById('itens-container').appendChild(div);
            atualizarTudo();
        }

        function salvarDados() {
            if(!personagens[indexAtual]) return;
            const p = personagens[indexAtual];
            p.foto = document.getElementById('img-retrato').src;
            p.nome = document.getElementById('nome-agente').value;
            p.nex = document.getElementById('nex').value;
            p.classe = document.getElementById('classe').value;
            p.trilha = document.getElementById('trilha').value;
            p.origem = document.getElementById('origem').value;
            p.bonusDef = document.getElementById('bonus-def').value;
            p.atributos = { for: document.getElementById('for').value, agi: document.getElementById('agi').value, int: document.getElementById('int').value, vig: document.getElementById('vig').value, pre: document.getElementById('pre').value };
            p.status = { pv: document.getElementById('res-pv').innerText, pe: document.getElementById('res-pe').innerText, san: document.getElementById('res-san').innerText };
            p.pericias = Array.from(document.querySelectorAll('.chk-per:checked')).map(x => x.dataset.nome);
            p.condicoes = Array.from(document.querySelectorAll('.chk-cond:checked')).map(x => x.dataset.nome);
            p.rituais = document.getElementById('txt-rituais').value;
            p.anotacoes = document.getElementById('txt-anotacoes').value;
            p.itens = Array.from(document.querySelectorAll('#itens-container > div')).map(div => ({ n: div.querySelector('input').value, w: div.querySelector('.item-w').value }));
            p.armas = Array.from(document.querySelectorAll('#armas-container > div')).map(div => ({ n: div.querySelectorAll('input')[0].value, t: div.querySelectorAll('input')[1].value, d: div.querySelector('.btn-dano').innerText }));
            localStorage.setItem('ordem_fichas', JSON.stringify(personagens));
            renderAbas();
        }

        function carregarAgente(idx) {
            indexAtual = idx; const p = personagens[idx];
            document.getElementById('img-retrato').src = p.foto || "https://i.imgur.com";
            document.getElementById('nome-agente').value = p.nome || "";
            document.getElementById('nex').value = p.nex || 5;
            document.getElementById('classe').value = p.classe || "combatente";
            document.getElementById('origem').value = p.origem || "";
            document.getElementById('bonus-def').value = p.bonusDef || 0;
            document.getElementById('for').value = p.atributos?.for || 1;
            document.getElementById('agi').value = p.atributos?.agi || 1;
            document.getElementById('int').value = p.atributos?.int || 1;
            document.getElementById('vig').value = p.atributos?.vig || 1;
            document.getElementById('pre').value = p.atributos?.pre || 1;
            document.getElementById('txt-rituais').value = p.rituais || "";
            document.getElementById('txt-anotacoes').value = p.anotacoes || "";
            document.getElementById('itens-container').innerHTML = ""; (p.itens || []).forEach(i => addItem(i.n, i.w));
            document.getElementById('armas-container').innerHTML = ""; (p.armas || []).forEach(a => addArma(a.n, a.t, a.d));
            atualizarTudo();
            if(p.status) { ['pv','pe','san'].forEach(t => document.getElementById(`res-${t}`).innerText = p.status[t]); }
            document.querySelectorAll('.chk-per').forEach(x => x.checked = p.pericias?.includes(x.dataset.nome));
            document.querySelectorAll('.chk-cond').forEach(x => x.checked = p.condicoes?.includes(x.dataset.nome));
            atualizarBarras();
        }

        function novoAgente() {
            personagens.push({ nome: "Novo Agente", nex: 5, classe: "combatente", trilha: "", foto: "", atributos: {for:1,agi:1,int:1,vig:1,pre:1}, pericias: [], condicoes: [], itens: [], armas: [], rituais: "" });
            carregarAgente(personagens.length - 1);
        }

        function rolarD(l) { const r = Math.floor(Math.random()*l)+1; document.getElementById('log-dados').innerText=`1D${l}:`; document.getElementById('resultado-dado').innerText=r; }

        function rolarTeste(a) {
            const v = parseInt(document.getElementById(a.toLowerCase()).value) || 0;
            if(v <= 0) {
                let d1=Math.floor(Math.random()*20)+1, d2=Math.floor(Math.random()*20)+1;
                document.getElementById('log-dados').innerText=`TESTE ${a} (DEFICIT):`; document.getElementById('resultado-dado').innerText=Math.min(d1, d2);
            } else {
                let res=[]; for(let i=0; i<v; i++) res.push(Math.floor(Math.random()*20)+1);
                document.getElementById('log-dados').innerText=`TESTE ${a} (${v}D20):`; document.getElementById('resultado-dado').innerText=Math.max(...res);
            }
        }

        function descanso(tipo) {
            ['pv', 'pe'].forEach(t => {
                const m = parseInt(document.getElementById(`max-${t}`).innerText);
                const a = parseInt(document.getElementById(`res-${t}`).innerText);
                document.getElementById(`res-${t}`).innerText = tipo==='longo' ? m : Math.min(m, a + Math.floor(m/2));
            });
            if(tipo==='longo') document.getElementById('res-san').innerText = document.getElementById('max-san').innerText;
            atualizarBarras(); salvarDados();
        }

        function renderAbas() {
            document.getElementById('lista-personagens').innerHTML = personagens.map((p, i) => `<div class="btn-personagem ${i===indexAtual?'ativo':''}" onclick="carregarAgente(${i})">${p.nome || 'S/ NOME'} (${p.nex}%)</div>`).join('');
        }

        function atualizarOrigem() {
            document.getElementById('desc-origem').innerText = ORIGENS_DB[document.getElementById('origem').value] || "Escolha uma origem.";
            salvarDados();
        }

        function deletarAtual() {
            if(confirm("Remover ficha?")) { personagens.splice(indexAtual, 1); if(personagens.length === 0) novoAgente(); else carregarAgente(0); }
        }
    </script>
</body>
</html>
