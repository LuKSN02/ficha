<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.G.O. - Sistema de Gestão da Ordem</title>
    <link rel="icon" type="image/png" href="1000.png">

    <!-- REDIRECIONAMENTO MOBILE -->
    <script>
        if (window.innerWidth <= 800 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            window.location.href = "mobile.html"; 
        }
    </script>

    <script src="https://cdnjs.cloudflare.com"></script>

    <style>
        @import url('https://fonts.googleapis.com');
        
        :root { 
            --sangue: #8b0000; 
            --sangue-brilho: #ff0000;
            --fundo: #0a0a0a; 
            --texto: #d1d1d1; 
            --borda: #333; 
            --ouro: #ffd700; 
            --oculto: #4b0082;
        }
        
        /* --- RESET E BASE --- */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            background-color: var(--fundo); 
            color: var(--texto); 
            font-family: 'Special Elite', monospace; 
            padding-bottom: 50px; 
            overflow-x: hidden; 
            transition: filter 0.8s, box-shadow 0.8s; 
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 9999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.3;
        }


        #estatica-camada {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: url('https://upload.wikimedia.org');
            opacity: 0; 
            pointer-events: none; 
            z-index: 9999; 
            mix-blend-mode: overlay; 
            transition: opacity 1s;
        }

        .insanidade-total #estatica-camada { 
            opacity: 0.28; 
        }

        .insanidade-visual { 
            filter: grayscale(0.8) contrast(1.5) sepia(0.5) brightness(0.7); 
        }

        .estado-morrendo { 
            box-shadow: inset 0 0 150px rgba(139, 0, 0, 0.9); 
            filter: sepia(1) saturate(2) !important; 
        }

        @keyframes pulsar { 
            0% { box-shadow: 0 0 5px var(--sangue); } 
            50% { box-shadow: 0 0 20px var(--sangue-brilho); } 
            100% { box-shadow: 0 0 5px var(--sangue); } 
        }

        @keyframes flash { 
            0% { filter: brightness(1); transform: scale(1); } 
            50% { filter: brightness(2.5); transform: scale(1.1); } 
            100% { filter: brightness(1); transform: scale(1); } 
        }

        @keyframes critico-glow { 
            0% { box-shadow: 0 0 0px var(--ouro); } 
            50% { box-shadow: 0 0 40px var(--ouro); } 
            100% { box-shadow: 0 0 0px var(--ouro); } 
        }
        
        .piscando { 
            animation: flash 0.4s ease; 
        }

        .critico { 
            animation: pulsar 1.5s infinite; 
        }

        .sucesso-critico { 
            animation: critico-glow 1s ease; 
            color: var(--ouro) !important; 
            text-shadow: 0 0 25px var(--ouro); 
        }

        .barra-update { 
            filter: brightness(4) saturate(2); 
            transition: none !important; 
        }

        /* --- LAYOUT DO PAINEL --- */
        #tela-login { 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); 
        }

        #dashboard { 
            display: none; 
            padding: 20px; 
        }

        .container-ficha { 
            max-width: 1050px; 
            margin: 0 auto; 
            background: #121212; 
            border: 1px solid var(--sangue); 
            padding: 30px; 
            box-shadow: 0 0 50px #000; 
            display: grid; 
            grid-template-columns: 1fr 380px; 
            gap: 25px; 
        }

        .secao { 
            border: 1px solid var(--borda); 
            padding: 15px; 
            margin-top: 20px; 
            background: #0d0d0d; 
        }

        h3 { 
            color: var(--sangue); 
            border-bottom: 1px solid var(--borda); 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            margin-bottom: 12px; 
            letter-spacing: 1px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        input, select, textarea { 
            width: 100%; 
            background: #000; 
            border: 1px solid var(--borda); 
            color: #fff; 
            padding: 8px; 
            font-family: inherit; 
            margin-bottom: 10px; 
            transition: 0.3s; 
        }

        input:focus { 
            border-color: var(--sangue); 
            outline: none; 
            box-shadow: 0 0 8px rgba(139, 0, 0, 0.5);
        }
        
        button { 
            width: 100%; 
            padding: 10px; 
            background: rgba(139, 0, 0, 0.05); 
            border: 1px solid var(--sangue); 
            color: var(--sangue); 
            font-family: inherit; 
            cursor: pointer; 
            text-transform: uppercase; 
            margin-top: 5px; 
            font-size: 0.7rem; 
            transition: 0.3s; 
        }

        button:hover { 
            background: var(--sangue); 
            color: white; 
            box-shadow: 0 0 15px var(--sangue); 
        }

        /* VITAIS DESIGN ORIGINAL */
        .status-box { 
            background: #050505; 
            padding: 20px; 
            border: 1px dashed #444; 
            margin: 15px 0; 
        }

        .status-item { 
            margin-bottom: 25px; 
        }

        .status-controle-wrapper { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 10px; 
        }

        .btn-status { 
            width: 35px; 
            height: 35px; 
            background: transparent; 
            border: 1px solid #333; 
            color: #666; 
            font-size: 1.2rem; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .status-valor-grande { 
            font-size: 2.2rem; 
            font-weight: bold; 
            min-width: 60px; 
            text-align: center; 
        }
        
        #res-pv { color: #8b0000; } 
        #res-pe { color: #ffd700; } 
        #res-san { color: #4b0082; }
        
        .barra-fundo { 
            height: 6px; 
            background: #111; 
            border-radius: 10px; 
            overflow: hidden; 
            margin: 4px 0; 
        }

        .barra-progresso { 
            height: 100%; 
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .barra-pv { background: #8b0000; } 
        .barra-pe { background: #ffd700; } 
        .barra-san { background: #4b0082; }

        .btn-descanso { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            padding: 12px; 
            font-size: 0.65rem; 
            background: transparent !important; 
            margin-bottom: 5px; 
        }

        /* TERMINAL E LOG DESIGN ORIGINAL */
        #log-container { 
            height: 180px; 
            background: #000; 
            border: 1px solid var(--borda); 
            margin-top: 10px; 
            padding: 10px; 
            overflow-y: auto; 
            font-size: 0.65rem; 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
            color: #666; 
            border-left: 2px solid var(--ouro); 
        }

        .log-entry { 
            border-bottom: 1px solid #111; 
            padding-bottom: 4px; 
        }

        .log-entry b { 
            color: var(--ouro); 
        }

        .input-formula { 
            border-color: var(--ouro) !important; 
            color: var(--ouro) !important; 
            text-align: center; 
            font-size: 0.9rem; 
            letter-spacing: 2px; 
        }

        /* COMPONENTES DE GRADE */
        .header-agente { 
            display: flex; 
            gap: 20px; 
            align-items: flex-end; 
            margin-bottom: 10px; 
        }

        .retrato-container { 
            width: 120px; 
            height: 120px; 
            border: 2px solid var(--sangue); 
            border-radius: 50%; 
            overflow: hidden; 
            background: #050505; 
            flex-shrink: 0; 
            cursor: pointer; 
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.3); 
        }

        .grid-atributos { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 10px; 
            margin-bottom: 15px; 
        }

        .atrib-box { 
            text-align: center; 
            border: 1px solid var(--borda); 
            padding: 5px; 
            cursor: pointer; 
            transition: 0.2s; 
        }

        .atrib-val { 
            font-size: 1.6rem; 
            border: none; 
            border-bottom: 2px solid var(--sangue); 
            text-align: center; 
            background: transparent; 
            width: 100%; 
            color: white; 
        }
        
        .grid-check, .grid-pericia {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Mantém as 3 colunas */
            gap: 12px 15px; /* Espaçamento entre as perícias */
            align-items: center;
            width: 100%;
        }

        .check-item {
            display: grid !important; /* Força o uso de Grid */
            grid-template-columns: 25px 1fr; /* Coluna 1: Checkbox (25px), Coluna 2: Texto */
            align-items: center;
            gap: 8px;
            font-size: 0.68rem;
            color: #aaa;
            cursor: pointer;
            text-align: left; /* Garante alinhamento à esquerda */
        }

        .check-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin: 0;
            cursor: pointer;
            justify-self: center; /* Centraliza o check dentro dos 25px */
        }

        #lista-condicoes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .defesa-box { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin: 15px 0; 
        }

        .defesa-card { 
            background: #151515; 
            padding: 10px; 
            text-align: center; 
            border: 1px solid var(--borda); 
        }

        .defesa-card b { 
            display: block; 
            font-size: 1.3rem; 
            color: var(--ouro); 
        }

        #lista-personagens { 
            margin-bottom: 20px; 
            border-bottom: 2px solid var(--sangue); 
            padding-bottom: 10px; 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            grid-column: 1 / span 2; 
        }

        .btn-personagem { 
            background: #1a1a1a; 
            color: #666; 
            border: 1px solid #333; 
            padding: 8px 16px; 
            cursor: pointer; 
            white-space: nowrap; 
            font-size: 0.8rem; 
        }

        .btn-personagem.ativo { 
            border-color: var(--sangue); 
            color: white; 
            background: var(--sangue); 
        }

        .arma-row { 
            display: grid; 
            grid-template-columns: 2fr 1fr 1fr 30px; 
            gap: 5px; 
            margin-bottom: 5px; 
        }

        .item-row { 
            display: grid; 
            grid-template-columns: 3fr 1fr 30px; 
            gap: 5px; 
            margin-bottom: 5px; 
        }

        .btn-del { 
            color: #ff4444; 
            border: none !important; 
            background: transparent !important; 
            cursor: pointer; 
            font-weight: bold; 
        }

        .texto-instavel {
            text-shadow: 2px 0 #ff0000, -2px 0 #4b0082;
            animation: jitter 0.1s infinite;
        }

        @keyframes jitter {
            0% { transform: translate(0); }
            25% { transform: translate(-1px, 1px); }
            50% { transform: translate(1px, -1px); }
            75% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, 1px); }
        }
        .aba-glitch {
            color: #fff !important;
            text-shadow: 2px 0 #ff0000, -2px 0 #4b0082, 0 0 10px #ff0000;
            border-color: var(--sangue-brilho) !important;
        }
        @media print {
    /* Esconde tudo que não é a ficha (botões, login, etc) */
    body * { visibility: hidden; background: #000 !important; }
    #dashboard, .container-ficha, .container-ficha * { visibility: visible; }
    
    /* Reposiciona a ficha no topo da página do PDF */
    .container-ficha {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        border: none !important;
        box-shadow: none !important;
    }

    /* Esconde botões de deletar e adicionar dentro da ficha no PDF */
    button, .btn-del, #lista-personagens { display: none !important; }
    
    /* Garante que as cores de fundo (Barras de PV/SAN) apareçam */
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

    .carga-excedida {
    color: #ff4444 !important;
    text-shadow: 0 0 10px #ff0000;
    font-weight: bold;
    animation: pulsar-alerta 1s infinite;
}

@keyframes pulsar-alerta {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
}

}

    </style>
</head>
<body>

    <input type="file" id="input-arquivo" style="display:none" accept="image/*" onchange="processarUpload(this)">    
    <div id="estatica-camada"></div>
    <audio id="snd-click" src="https://assets.mixkit.co"></audio>
    <audio id="snd-dice" src="https://assets.mixkit.co"></audio>

    <section id="tela-login">
        <div style="background: #121212; padding: 40px; border: 1px solid var(--borda); border-top: 4px solid var(--sangue); text-align: center; width: 350px;">
            <h2 style="color: var(--sangue);">ORDO REALITAS</h2>
            <p style="font-size: 0.6rem; letter-spacing: 2px; margin-bottom: 20px; color: #555;">SISTEMA DE GESTÃO V3.0</p>
            <input type="text" id="user" placeholder="NOME DE AGENTE">
            <button onclick="fazerLogin()">Acessar Terminal</button>
        </div>
    </section>

    <section id="dashboard">
        <div class="container-ficha">
            <div id="lista-personagens"></div>
            
            <div class="coluna-principal">
                <div class="header-agente">
                    <div class="retrato-container" onclick="mudarFoto()">
                        <img id="img-retrato" src="https://i.imgur.com" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="info-basica" style="flex:1">
                        <div style="display: flex; gap: 15px;">
                            <!-- Procure esta linha no seu código e deixe assim: -->
                            <div style="flex: 2;">
                            <label>Agente</label>
                            <input type="text" id="nome-agente" oninput="salvarDados(); renderAbas()">
                        </div>
                            <div style="flex: 1;"><label>NEX %</label><input type="number" id="nex" value="5" step="5" onchange="atualizarTudo()"></div>
                        </div>
                        <div style="display: flex; gap: 15px;">
                            <div style="flex: 1;"><label>Classe</label><select id="classe" onchange="atualizarTudo()"><option value="combatente">Combatente</option><option value="especialista">Especialista</option><option value="ocultista">Ocultista</option></select></div>
                            <div style="flex: 1;"><label>Trilha</label><select id="trilha" onchange="salvarDados()"></select></div>
                        </div>
                    </div>
                </div>

                <div class="secao">
                    <label>Origem</label>
                    <select id="origem" onchange="atualizarOrigem()"></select>
                    <div id="desc-origem" style="font-size: 0.72rem; color: var(--ouro); margin-top: 10px; line-height: 1.4; border-left: 2px solid var(--sangue); padding-left: 10px; font-style: italic;">
                        Selecione uma origem para ver os detalhes...
                    </div>
                </div>

                <div class="grid-atributos">
                    <div class="atrib-box" onclick="rolarTeste('FOR')"><label>FOR</label><input type="number" class="atrib-val" id="for" value="1" onclick="event.stopPropagation()" onchange="atualizarTudo()"></div>
                    <div class="atrib-box" onclick="rolarTeste('AGI')"><label>AGI</label><input type="number" class="atrib-val" id="agi" value="1" onclick="event.stopPropagation()" onchange="atualizarTudo()"></div>
                    <div class="atrib-box" onclick="rolarTeste('INT')"><label>INT</label><input type="number" class="atrib-val" id="int" value="1" onclick="event.stopPropagation()" onchange="atualizarTudo()"></div>
                    <div class="atrib-box" onclick="rolarTeste('VIG')"><label>VIG</label><input type="number" class="atrib-val" id="vig" value="1" onclick="event.stopPropagation()" onchange="atualizarTudo()"></div>
                    <div class="atrib-box" onclick="rolarTeste('PRE')"><label>PRE</label><input type="number" class="atrib-val" id="pre" value="1" onclick="event.stopPropagation()" onchange="atualizarTudo()"></div>
                </div>

                <div class="defesa-box">
                    <div class="defesa-card"><label>Defesa</label><b id="defesa-val">10</b><small>10+AGI+<input type="number" id="bonus-def" value="0" style="width:30px; margin:0;" onchange="atualizarTudo()"></small></div>
                    <div class="defesa-card"><label>Esquiva</label><b id="esquiva-val">10</b><small>Defesa + Reflexos</small></div>
                </div>

                <div class="secao">
                    <h3>Arsenal <button onclick="addArma()" style="width:auto;">+ Arma</button></h3>
                    <div id="armas-container"></div>
                </div>

                <div class="secao">
                    <h3>Condições</h3>
                    <div id="lista-condicoes" class="grid-check"></div>
                </div>

                <div class="secao">
                    <h3>Perícias (<span id="count-pericias">0</span>)</h3>
                    <div id="lista-pericias" class="grid-pericia"></div>
                </div>
            </div>

            <div class="coluna-lateral">
                <div class="secao">
                    <h3 style="color: #666; border: none;">VITAIS</h3>
                    <div class="status-box">
                        <div class="status-item"><label>PV</label>
                            <div class="status-controle-wrapper">
                                <button class="btn-status" onclick="altStatus('pv',-1)">-</button>
                                <span id="res-pv" class="status-valor-grande">0</span>
                                <button class="btn-status" onclick="altStatus('pv',1)">+</button>
                            </div>
                            <div class="barra-fundo"><div id="bar-pv" class="barra-progresso barra-pv"></div></div>
                            <small>MÁX: <span id="max-pv">0</span></small>
                        </div>
                        <div class="status-item"><label>SAN</label>
                            <div class="status-controle-wrapper">
                                <button class="btn-status" onclick="altStatus('san',-1)">-</button>
                                <span id="res-san" class="status-valor-grande">0</span>
                                <button class="btn-status" onclick="altStatus('san',1)">+</button>
                            </div>
                            <div class="barra-fundo"><div id="bar-san" class="barra-progresso barra-san"></div></div>
                            <small>MÁX: <span id="max-san">0</span></small>
                        </div>
                        <div class="status-item"><label>PE</label>
                            <div class="status-controle-wrapper">
                                <button class="btn-status" onclick="altStatus('pe',-1)">-</button>
                                <span id="res-pe" class="status-valor-grande">0</span>
                                <button class="btn-status" onclick="altStatus('pe',1)">+</button>
                            </div>
                            <div class="barra-fundo"><div id="bar-pe" class="barra-progresso barra-pe"></div></div>
                            <small>MÁX: <span id="max-pe">0</span></small>
                        </div>
                    </div>
                    <button class="btn-descanso btn-longo" onclick="descanso('longo')">☕ DESCANSO LONGO</button>
                    <button class="btn-descanso btn-curto" onclick="descanso('curto')">🕒 DESCANSO CURTO</button>
                </div>

                <div class="secao">
                    <h3>Terminal de Dados</h3>
                    <div id="terminal-display" style="background:#000; padding:15px; border:1px solid var(--borda); text-align:center;">
                        <div id="resultado-dado" style="font-size:3.5rem; color:var(--ouro); font-weight:bold;">0</div>
                    </div>
                    <input type="text" id="formula-input" class="input-formula" placeholder="EX: 2d10 + 5" onkeypress="if(event.key==='Enter') rolarCustom()">
                    <div id="log-container"></div>
                </div>

                <div class="secao">
                    <h3>Mochila</h3>
                    <div id="itens-container"></div>
                    <button onclick="addItem()" style="font-size:0.6rem;">+ Item</button>
                    <div style="text-align:right; font-size:0.7rem; color:var(--ouro); margin-top:8px;">CARGA: <span id="carga-atual">0</span>/<span id="carga-max">0</span></div>
                </div>

                <div class="secao" style="border-color: var(--oculto);">
                    <h3 style="color: #9932cc;">
                        Rituais (<span id="circulo-max">1º</span> Círculo)
                        <button onclick="abrirGrimorio()" style="width:auto; padding: 2px 10px; border-color: #9932cc; color: #9932cc;">+ APRENDER</button>
                    </h3>
                    <textarea id="txt-rituais" style="height: 100px; background:#05000a; color:#e0b0ff;" oninput="salvarDados()"></textarea>
                </div>
                <div id="meus-rituais" style="display: flex; flex-direction: column; gap: 8px;"></div>

                
                
                
                <div class="secao">
                    <h3>Anotações</h3>
                    <textarea id="txt-anotacoes" style="height: 100px; font-size:0.7rem;" oninput="salvarDados()"></textarea>
                </div>

                <button onclick="novoAgente()" style="font-size:0.6rem; margin-top:10px">+ Novo Agente</button>
                <button onclick="deletarAtual()" style="color:#400; border-color:#400; font-size:0.6rem;">Remover Agente</button>
                <button onclick="exportarPDF()" style="background: #1a1a1a; color: var(--ouro); border-color: var(--ouro); font-size: 0.6rem; margin-top: 10px;">
                📂 EXPORTAR FICHA (PDF)
            </button>

        function iniciarSistemasAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Criando Brown Noise (Zumbido abafado)
            const bufferSize = 4096;
            let lastOut = 0.0;
            
            noiseNode = audioCtx.createScriptProcessor(bufferSize, 1, 1);
            noiseNode.onaudioprocess = function(e) {
                let output = e.outputBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    let white = Math.random() * 2 - 1;
                    output[i] = (lastOut + (0.02 * white)) / 1.02;
                    lastOut = output[i];
                    output[i] *= 3.5; 
                }
            }

            // Filtro de Ressonância (Pressão nos ouvidos)
            let resonance = audioCtx.createBiquadFilter();
            resonance.type = "lowpass";
            resonance.frequency.value = 450;

            noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0;
            
            noiseNode.connect(resonance);
            resonance.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            
            whisperInterval = setInterval(sussurrar, 15000);
        }

                msg.pitch = 0.1; 
                msg.rate = 0.5; 
                msg.volume = 0.4;
                window.speechSynthesis.speak(msg);
            }
        }

                const barra = document.getElementById(`bar-${t}`);
                const pct = (a/m)*100;
                barra.style.width = pct + "%";

                if(t === 'san') {
                    if(noiseGain) {
                        const vol = pct < 25 ? (1 - (pct/25)) * 0.18 : 0;
                        noiseGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.5);
                    }
                    if(pct < 25) document.body.classList.add('insanidade-visual'); 
                    else document.body.classList.remove('insanidade-visual');
                    
                    if(pct <= 0) document.body.classList.add('insanidade-total'); 
                    else document.body.classList.remove('insanidade-total');

                    qtd = parseInt(qtd) || 1; lados = parseInt(lados);
                    let s = 0, rols = [];
                    for(let i=0; i<Math.abs(qtd); i++) { let r = Math.floor(Math.random()*lados)+1; s+=r; rols.push(r); }
                    if(p.startsWith('-')) total -= s; else total += s;
                    det += `${p}(${rols.join(',')}) `;
                } else { total += parseInt(p); det += `${p} `; }
            });
            exibirResultado(total, `FÓRMULA`, det);
            document.getElementById('formula-input').value = "";
        }

        function exibirResultado(res, tipo, detalhes) {
            const display = document.getElementById('resultado-dado');
            display.innerText = res;
            display.classList.remove('sucesso-critico');

            if (tipo.includes('TESTE') && detalhes.includes('20')) {
                display.classList.add('sucesso-critico');
                document.body.classList.add('piscando');
                setTimeout(() => document.body.classList.remove('piscando'), 400);
            }

            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<b>${tipo}</b>: <span class="${display.classList.contains('sucesso-critico')?'sucesso-critico':''}">${res}</span><br><small>${detalhes}</small>`;
            document.getElementById('log-container').prepend(entry);
        }

        function addArma(n="", t="") {
            const div = document.createElement('div'); div.className = "arma-row";
            div.innerHTML = `<input type="text" placeholder="Arma" value="${n}" oninput="salvarDados()"><input type="text" placeholder="Dano" value="${t}" oninput="salvarDados()"><button onclick="playSnd('dice')">ROLL</button><button onclick="this.parentElement.remove(); salvarDados()" class="btn-del">X</button>`;
            document.getElementById('armas-container').appendChild(div);
            salvarDados();
        }

        function addItem(n="", w=1) {
            const div = document.createElement('div'); div.className = "item-row";
            div.innerHTML = `<input type="text" placeholder="Item" value="${n}" oninput="salvarDados()"><input type="number" class="item-w" value="${w}" onchange="atualizarTudo()"><button onclick="this.parentElement.remove(); atualizarTudo()" class="btn-del">X</button>`;
            document.getElementById('itens-container').appendChild(div);
            atualizarTudo();
        }

        function salvarDados() {
            if(!personagens[indexAtual]) return;
            const p = personagens[indexAtual];

    // Atualiza o nome e a aba sem reconstruir o HTML (Evita quebrar o foco)
            const novoNome = document.getElementById('nome-agente').value || 'S/ NOME';
            p.nome = novoNome;
    
            const abas = document.querySelectorAll('.btn-personagem');
            if (abas[indexAtual]) {
             abas[indexAtual].innerText = novoNome.toUpperCase();
            abas[indexAtual].classList.add('aba-glitch');
            setTimeout(() => abas[indexAtual].classList.remove('aba-glitch'), 150);
        }

    // Salva o restante dos dados
            p.nex = document.getElementById('nex').value;
            p.classe = document.getElementById('classe').value;
            p.trilha = document.getElementById('trilha').value;
            p.origem = document.getElementById('origem').value;
            p.foto = document.getElementById('img-retrato').src; // Garante o salvamento da foto
            p.atributos = { 
                for: document.getElementById('for').value, 
                agi: document.getElementById('agi').value, 
                int: document.getElementById('int').value, 
                vig: document.getElementById('vig').value, 
                pre: document.getElementById('pre').value 
        };
            p.status = { 
                pv: document.getElementById('res-pv').innerText, 
                pe: document.getElementById('res-pe').innerText, 
                san: document.getElementById('res-san').innerText 
        };
            p.rituais = document.getElementById('txt-rituais').value;
            p.anotacoes = document.getElementById('txt-anotacoes').value;
            p.pericias = Array.from(document.querySelectorAll('.chk-per:checked')).map(x => x.dataset.nome);
            p.condicoes = Array.from(document.querySelectorAll('.chk-cond:checked')).map(x => x.dataset.nome);

             localStorage.setItem('ordem_fichas', JSON.stringify(personagens));
}


        function carregarAgente(idx) {
    indexAtual = idx; const p = personagens[idx];
    if(!p) return;

    // Carrega a foto salva ou a padrão
    document.getElementById('img-retrato').src = p.foto || "https://i.imgur.com";

    document.getElementById('nome-agente').value = p.nome || "";
    document.getElementById('nex').value = p.nex || 5;
    document.getElementById('classe').value = p.classe || "combatente";
    document.getElementById('origem').value = p.origem || "";
    document.getElementById('for').value = p.atributos?.for || 1;
    document.getElementById('agi').value = p.atributos?.agi || 1;
    document.getElementById('int').value = p.atributos?.int || 1;
    document.getElementById('vig').value = p.atributos?.vig || 1;
    document.getElementById('pre').value = p.atributos?.pre || 1;
    document.getElementById('txt-rituais').value = p.rituais || "";
    document.getElementById('txt-anotacoes').value = p.anotacoes || "";
    
    document.getElementById('armas-container').innerHTML = ""; 
    (p.armas || []).forEach(a => addArma(a.n, a.t));
    document.getElementById('itens-container').innerHTML = ""; 
    (p.itens || []).forEach(i => addItem(i.n, i.w));
    
    document.querySelectorAll('.chk-per').forEach(x => x.checked = p.pericias?.includes(x.dataset.nome));
    document.querySelectorAll('.chk-cond').forEach(x => x.checked = p.condicoes?.includes(x.dataset.nome));
    
    if(p.status) { 
        document.getElementById('res-pv').innerText = p.status.pv; 
        document.getElementById('res-pe').innerText = p.status.pe; 
        document.getElementById('res-san').innerText = p.status.san; 
    }
    
    renderRituais();
    renderAbas();
    atualizarTudo();
}

function novoAgente() {
    personagens.push({ 
        nome: "Novo Agente", nex: 5, classe: "combatente", 
        foto: "https://i.imgur.com",
        atributos: {for:1,agi:1,int:1,vig:1,pre:1}, 
        armas: [], itens: [], pericias:[], rituais_lista: [], condicoes:[] 
    });
    carregarAgente(personagens.length - 1);
}

        function renderAbas() {
            document.getElementById('lista-personagens').innerHTML = personagens.map((p, i) => 
                `<div class="btn-personagem ${i===indexAtual?'ativo':''}" onclick="carregarAgente(${i})">${p.nome || 'S/ NOME'}</div>`
            ).join('');
        }

        function descanso(tipo) {
            playSnd('click');
            const mPV = parseInt(document.getElementById('max-pv').innerText);
            const mPE = parseInt(document.getElementById('max-pe').innerText);
            if(tipo === 'longo') { 
                document.getElementById('res-pv').innerText = mPV; 
                document.getElementById('res-pe').innerText = mPE; 
                document.getElementById('res-san').innerText = document.getElementById('max-san').innerText; 
            } else { 
                altStatus('pv', Math.floor(mPV/2)); 
                altStatus('pe', Math.floor(mPE/2)); 
            }
            atualizarBarras();
        }

        function mudarFoto() {
    document.getElementById('input-arquivo').click();
}

function processarUpload(input) {
    if (input.files && input.files[0]) {
        const leitor = new FileReader();
        leitor.onload = function(e) {
            const fotoBase64 = e.target.result;
            document.getElementById('img-retrato').src = fotoBase64;
            if (personagens[indexAtual]) {
                personagens[indexAtual].foto = fotoBase64;
                localStorage.setItem('ordem_fichas', JSON.stringify(personagens));
            }
        };
        leitor.readAsDataURL(input.files[0]);
    }
}

function processarUpload(input) {
    if (input.files && input.files[0]) {
        const leitor = new FileReader();
        leitor.onload = function(e) {
            const fotoBase64 = e.target.result;
            // 1. Mostra na tela
            document.getElementById('img-retrato').src = fotoBase64;
            // 2. Salva no personagem atual para não sumir no F5
            if (personagens[indexAtual]) {
                personagens[indexAtual].foto = fotoBase64;
                localStorage.setItem('ordem_fichas', JSON.stringify(personagens));
            }
        };
        leitor.readAsDataURL(input.files[0]);
    }
}

        function deletarAtual() { if(confirm("Deletar ficha?")) { personagens.splice(indexAtual, 1); if(personagens.length === 0) novoAgente(); else carregarAgente(0); } }
        function atualizarOrigem() {
            const orgKey = document.getElementById('origem').value;
            const info = ORIGENS_DB[orgKey];
    
    // 1. Resetar todas as perícias de "trava" antes de aplicar a nova origem
    document.querySelectorAll('.chk-per').forEach(cb => {
        cb.disabled = false; 
        cb.parentElement.style.opacity = "1";
        cb.parentElement.style.color = "#aaa";
    });

    if (!info || !info.p) return;

    // 2. Atualizar descrição visual
    document.getElementById('desc-origem').innerHTML = info.d;

    // 3. Marcar e Trancar as perícias da Origem
    info.p.forEach(periciaNome => {
        const checkbox = document.querySelector(`.chk-per[data-nome="${periciaNome}"]`);
        if (checkbox) {
            checkbox.checked = true;
            checkbox.disabled = true; // TRAVA: Jogador não pode desmarcar
            checkbox.parentElement.style.color = "var(--ouro)"; // Estética de "Treinado"
            checkbox.parentElement.style.opacity = "0.8";
        }
    });

    atualizarTudo();
    salvarDados();
    
}

function exportarPDF() {
    // 1. Tira o brilho de glitch e animações que podem bugar o PDF
    const abas = document.querySelectorAll('.btn-personagem');
    abas.forEach(a => a.classList.remove('aba-glitch'));

    // 2. Comando nativo do navegador para imprimir
    // Dica: Na janela que abrir, escolha "Salvar como PDF" no destino da impressora
    window.print();
}
function abrirGrimorio(elementoFiltro = 'Todos') {
    document.getElementById('grimorio-modal').style.display = 'block';
    const lista = document.getElementById('lista-grimorio');
    
    // Botões de filtro
    let htmlBotoes = `
        <div style="grid-column: 1 / span 2; display: flex; gap: 5px; margin-bottom: 15px;">
            ${['Todos', 'Sangue', 'Morte', 'Energia', 'Conhecimento'].map(el => 
                `<button onclick="abrirGrimorio('${el}')" style="font-size:0.5rem; border-color:${el==='Todos'?'#fff':'var(--oculto)'}">${el}</button>`
            ).join('')}
        </div>
    `;

    const rituaisFiltrados = elementoFiltro === 'Todos' ? 
        RITUAIS_DB : RITUAIS_DB.filter(r => r.e === elementoFiltro);

    lista.innerHTML = htmlBotoes + rituaisFiltrados.map((rit) => `
        <div style="border: 1px solid #222; padding: 10px; background: #050505;">
            <b style="color: #e0b0ff;">${rit.n}</b> <small style="color: #666;">(${rit.e})</small>
            <p style="font-size: 0.55rem; color: #888;">${rit.d}</p>
            <button onclick="aprenderRitual('${rit.n}')" style="font-size: 0.5rem; margin-top:5px;">APRENDER</button>
        </div>
    `).join('');
}

function fecharGrimorio() { document.getElementById('grimorio-modal').style.display = 'none'; }

function aprenderRitual(nomeRitual) {
    const ritualOriginal = RITUAIS_DB.find(r => r.n === nomeRitual);
    
    if (!ritualOriginal) {
        console.error("Ritual não encontrado no banco:", nomeRitual);
        return;
    }

    const p = personagens[indexAtual];
    
    // Inicializa a lista se não existir
    if (!p.rituais_lista) p.rituais_lista = [];

    // Verifica se já conhece o ritual
    const jaConhece = p.rituais_lista.some(r => r.n === nomeRitual);

    if (!jaConhece) {
        // Copia o ritual para a ficha do personagem
        p.rituais_lista.push({...ritualOriginal});
        renderRituais(); // Atualiza a tela
        salvarDados();   // Grava no LocalStorage
        console.log("Aprendido:", nomeRitual);
    } else {
        alert("Você já conhece este ritual!");
    }
    
    fecharGrimorio(); // Fecha o painel
}
function renderRituais() {
    const container = document.getElementById('meus-rituais');
    const p = personagens[indexAtual];
    if(!p || !p.rituais_lista) return;

    container.innerHTML = p.rituais_lista.map((rit, i) => `
        <div style="background: #05000a; border: 1px solid #2a004d; padding: 10px; margin-bottom: 8px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <b style="color: #e0b0ff; font-size: 0.65rem;">${rit.n.toUpperCase()}</b>
                <button onclick="removerRitual(${i})" class="btn-del" style="width:20px;">×</button>
            </div>
            <button onclick="conjurarRitual('${rit.r}', ${rit.pe || 1})">
    CONJURAR (${rit.r}) -${rit.pe || 1} PE
</button>
        </div>
    `).join('');
}


function conjurarRitual(formula, custo) {
    const elPE = document.getElementById('res-pe');
    if (!elPE) {
        alert("ERRO: O campo de PE 'res-pe' não foi encontrado!");
        return;
    }
    
    const peAtual = parseInt(elPE.innerText) || 0;

    if (peAtual >= custo) {
        // Tenta gastar o PE usando sua função original altStatus
        if (typeof altStatus === "function") {
            altStatus('pe', -custo);
        } else {
            elPE.innerText = peAtual - custo; // Fallback se altStatus não existir
        }
        
        // ENVIA PARA O TERMINAL
        rolarCustom(formula);
    } else {
        alert("PE INSUFICIENTE!");
    }
}


function removerRitual(i) {
    personagens[indexAtual].rituais_lista.splice(i, 1);
    renderRituais();
    salvarDados();
}
