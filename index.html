<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>S.I.G.O. - Sistema de Gestão da Ordem</title>
    <style>
        @import url('https://fonts.googleapis.com');
        :root { --sangue: #8b0000; --fundo: #0a0a0a; --texto: #d1d1d1; --borda: #333; --ouro: #ffd700; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--fundo); color: var(--texto); font-family: 'Special Elite', monospace; padding-bottom: 50px; }
        
        #tela-login { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); }
        #dashboard { display: none; padding: 20px; }
        
        .container-ficha { max-width: 950px; margin: 0 auto; background: #121212; border: 1px solid var(--sangue); padding: 30px; box-shadow: 0 0 50px #000; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }

        .secao { border: 1px solid var(--borda); padding: 15px; margin-top: 20px; background: #0d0d0d; }
        h3 { color: var(--sangue); border-bottom: 1px solid var(--borda); font-size: 1rem; text-transform: uppercase; margin-bottom: 10px; }

        input, select, textarea { width: 100%; background: #000; border: 1px solid var(--borda); color: #fff; padding: 8px; font-family: inherit; margin-bottom: 10px; }
        
        .grid-atributos { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 15px; }
        .atrib-box { text-align: center; border: 1px solid var(--borda); padding: 5px; cursor: pointer; transition: 0.2s; }
        .atrib-box:hover { border-color: var(--ouro); background: #1a1a1a; }
        
        .atrib-val { 
            font-size: 1.5rem; border: none; border-bottom: 2px solid var(--sangue); 
            text-align: center; background: transparent; width: 100%; color: white;
            pointer-events: auto !important; cursor: text;
        }

        .status-box { display: flex; justify-content: space-around; background: #000; padding: 15px; border: 1px dashed var(--sangue); margin: 15px 0; }
        .status-item { text-align: center; }
        .status-item span { display: block; font-size: 1.8rem; color: var(--sangue); font-weight: bold; }
        .status-item small { font-size: 0.65rem; color: #666; display: block; margin-top: 2px; }

        .btn-status { background: transparent; border: 1px solid var(--borda); color: var(--texto); width: 25px; cursor: pointer; font-size: 0.8rem; padding: 2px; margin: 0 2px; }
        .btn-status:hover { border-color: var(--sangue); color: var(--sangue); }

        #lista-personagens { margin-bottom: 20px; border-bottom: 2px solid var(--sangue); padding-bottom: 10px; display: flex; gap: 10px; overflow-x: auto; grid-column: 1 / span 2; }
        .btn-personagem { background: #1a1a1a; color: #666; border: 1px solid #333; padding: 5px 15px; cursor: pointer; white-space: nowrap; }
        .btn-personagem.ativo { border-color: var(--sangue); color: var(--sangue); }

        button { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--sangue); color: var(--sangue); font-family: inherit; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        button:hover { background: var(--sangue); color: white; }

        .dice-result { background: #000; padding: 10px; border: 1px solid var(--borda); text-align: center; margin-bottom: 10px; }
        .val-dado { display: block; font-size: 2rem; color: var(--ouro); font-weight: bold; }
        .pericia-item { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; }
        .chk-pericia { width: auto; margin: 0; }
    </style>
</head>
<body>

    <section id="tela-login">
        <div style="background: #121212; padding: 40px; border: 1px solid var(--borda); border-top: 4px solid var(--sangue); text-align: center; width: 350px;">
            <h2 style="color: var(--sangue); margin-bottom: 5px;">ORDO REALITAS</h2>
            <p style="font-size: 0.7rem; margin-bottom: 25px; letter-spacing: 2px;">SISTEMA DE GESTÃO V1.2</p>
            <input type="text" id="user" placeholder="NOME DE AGENTE">
            <button onclick="fazerLogin()">Acessar Terminal</button>
        </div>
    </section>

    <section id="dashboard">
        <div class="container-ficha">
            <div id="lista-personagens"></div>
            
            <div class="coluna-principal">
                <div style="display: flex; gap: 15px;">
                    <div style="flex: 2;"><label>AGENTE</label><input type="text" id="nome-agente" oninput="salvarDados()"></div>
                    <div style="flex: 1;"><label>NEX (%)</label><input type="number" id="nex" value="5" step="5" onchange="atualizarTudo()"></div>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;"><label>CLASSE</label><select id="classe" onchange="atualizarTudo()"><option value="combatente">Combatente</option><option value="especialista">Especialista</option><option value="ocultista">Ocultista</option></select></div>
                    <div style="flex: 1;"><label>TRILHA</label><select id="trilha" onchange="salvarDados()"></select></div>
                </div>

                <div class="grid-atributos">
                    <div class="atrib-box" onclick="rolarTeste('FOR')"><label>FOR</label><input type="number" class="atrib-val" id="for" value="1" onchange="atualizarTudo()" onclick="event.stopPropagation()"></div>
                    <div class="atrib-box" onclick="rolarTeste('AGI')"><label>AGI</label><input type="number" class="atrib-val" id="agi" value="1" onchange="atualizarTudo()" onclick="event.stopPropagation()"></div>
                    <div class="atrib-box" onclick="rolarTeste('INT')"><label>INT</label><input type="number" class="atrib-val" id="int" value="1" onchange="atualizarTudo()" onclick="event.stopPropagation()"></div>
                    <div class="atrib-box" onclick="rolarTeste('VIG')"><label>VIG</label><input type="number" class="atrib-val" id="vig" value="1" onchange="atualizarTudo()" onclick="event.stopPropagation()"></div>
                    <div class="atrib-box" onclick="rolarTeste('PRE')"><label>PRE</label><input type="number" class="atrib-val" id="pre" value="1" onchange="atualizarTudo()" onclick="event.stopPropagation()"></div>
                </div>

                <div class="status-box">
                    <div class="status-item">
                        <label>PV ATUAL</label>
                        <div style="display: flex; align-items: center; justify-content: center;">
                            <button class="btn-status" onclick="alterarStatus('pv', -1)">-</button>
                            <span id="res-pv">0</span>
                            <button class="btn-status" onclick="alterarStatus('pv', 1)">+</button>
                        </div>
                        <small>MÁX: <span id="max-pv">0</span></small>
                    </div>
                    <div class="status-item">
                        <label>PE ATUAL</label>
                        <div style="display: flex; align-items: center; justify-content: center;">
                            <button class="btn-status" onclick="alterarStatus('pe', -1)">-</button>
                            <span id="res-pe">0</span>
                            <button class="btn-status" onclick="alterarStatus('pe', 1)">+</button>
                        </div>
                        <small>MÁX: <span id="max-pe">0</span></small>
                    </div>
                    <div class="status-item">
                        <label>SAN ATUAL</label>
                        <div style="display: flex; align-items: center; justify-content: center;">
                            <button class="btn-status" onclick="alterarStatus('san', -1)">-</button>
                            <span id="res-san">0</span>
                            <button class="btn-status" onclick="alterarStatus('san', 1)">+</button>
                        </div>
                        <small>MÁX: <span id="max-san">0</span></small>
                    </div>
                </div>
                <button onclick="descansoLongo()" style="border-color: var(--ouro); color: var(--ouro); font-size: 0.8rem; margin-bottom: 10px;">☕ Descanso Longo (Resetar Status)</button>

                <div class="secao">
                    <h3>PERÍCIAS (<span id="count-pericias">0</span> LIMITE)</h3>
                    <div id="lista-pericias" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;"></div>
                </div>
            </div>

            <div class="coluna-lateral">
                <div class="secao">
                    <h3>DADOS</h3>
                    <div class="dice-result">
                        <div id="log-dados" style="font-size: 0.6rem; color: #666; margin-bottom: 5px;">AGUARDANDO...</div>
                        <div id="resultado-dado" class="val-dado">0</div>
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <button onclick="rolarD(20)">D20</button>
                        <button onclick="rolarD(6)">D6</button>
                        <button onclick="rolarD(10)">D10</button>
                    </div>
                </div>
                <div class="secao">
                    <h3>INVENTÁRIO</h3>
                    <div id="itens-container"></div>
                    <button onclick="addItem()" style="font-size: 0.7rem;">+ Adicionar Item</button>
                    <div style="text-align: right; font-size: 0.8rem; color: var(--ouro); margin-top: 10px;">
                        CARGA: <span id="carga-atual">0</span> / <span id="carga-max">0</span>
                    </div>
                </div>
                <div id="secao-rituais" class="secao" style="display:none;">
                    <h3>RITUAIS</h3>
                    <textarea id="txt-rituais" style="height: 100px;" oninput="salvarDados()"></textarea>
                </div>
                <button onclick="novoPersonagem()" style="margin-top: 15px; border-color: #222; color: #555;">+ Novo Agente</button>
                <button onclick="deletarAtual()" style="margin-top: 10px; border-color: #444; color: #444;">Deletar Agente</button>
            </div>
        </div>
    </section>

    <script>
        // Redirecionamento Mobile
        (function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile || window.innerWidth <= 800) { window.location.href = "mobile.html"; }
        })();

        const PERICIAS_LISTA = ["Acrobacia", "Adestramento", "Artes", "Atletismo", "Atualidades", "Crime", "Diplomacia", "Enganação", "Fortitude", "Furtividade", "Iniciativa", "Intimidação", "Intuição", "Investigação", "Luta", "Medicina", "Ocultismo", "Percepção", "Pilotagem", "Pontaria", "Profissão", "Reflexos", "Religião", "Sobrevivência", "Tática", "Tecnologia", "Vontade"];
        const TRILHAS_DB = {
            combatente: ["Aniquilador", "Comandante", "Guerreiro", "Op. Especiais", "Tropa de Choque"],
            especialista: ["Atirador Elite", "Infiltrador", "Médico Campo", "Negociador", "Técnico"],
            ocultista: ["Conduíte", "Flagelador", "Graduado", "Lâmina", "Intuitivo"]
        };

        let personagens = JSON.parse(localStorage.getItem('ordem_fichas')) || [];
        let indexAtual = 0;

        function fazerLogin() {
            if(document.getElementById('user').value) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                gerarCheckboxesPericias();
                if(personagens.length === 0) novoPersonagem();
                else carregarPersonagem(0);
            }
        }

        function rolarD(lados) {
            const r = Math.floor(Math.random() * lados) + 1;
            document.getElementById('log-dados').innerText = `1D${lados}:`;
            document.getElementById('resultado-dado').innerText = r;
        }

        function rolarTeste(atrib) {
            const val = parseInt(document.getElementById(atrib.toLowerCase()).value) || 0;
            let resultados = [];
            if(val <= 0) {
                let d1 = Math.floor(Math.random() * 20) + 1;
                let d2 = Math.floor(Math.random() * 20) + 1;
                document.getElementById('log-dados').innerText = `TESTE ${atrib} (DEFICIT): [${d1}, ${d2}]`;
                document.getElementById('resultado-dado').innerText = Math.min(d1, d2);
            } else {
                for(let i=0; i<val; i++) resultados.push(Math.floor(Math.random() * 20) + 1);
                document.getElementById('log-dados').innerText = `TESTE ${atrib} (${val}D20):`;
                document.getElementById('resultado-dado').innerText = Math.max(...resultados);
            }
        }

        function alterarStatus(tipo, valor) {
            const span = document.getElementById(`res-${tipo}`);
            let atual = parseInt(span.innerText) || 0;
            span.innerText = Math.max(0, atual + valor);
            salvarDados();
        }

        function descansoLongo() {
            if(confirm("Recuperar todos os status para o máximo?")) {
                document.getElementById('res-pv').innerText = document.getElementById('max-pv').innerText;
                document.getElementById('res-pe').innerText = document.getElementById('max-pe').innerText;
                document.getElementById('res-san').innerText = document.getElementById('max-san').innerText;
                salvarDados();
            }
        }

        function atualizarTudo() {
            const classe = document.getElementById('classe').value;
            const nex = parseInt(document.getElementById('nex').value) || 5;
            const forca = parseInt(document.getElementById('for').value) || 0;
            const vig = parseInt(document.getElementById('vig').value) || 0;
            const pre = parseInt(document.getElementById('pre').value) || 0;
            const int = parseInt(document.getElementById('int').value) || 0;

            const selTrilha = document.getElementById('trilha');
            selTrilha.disabled = nex < 10;
            if(nex < 10) selTrilha.innerHTML = "<option>Bloqueado</option>";
            else {
                const atualT = selTrilha.value;
                selTrilha.innerHTML = TRILHAS_DB[classe].map(t => `<option ${t===atualT?'selected':''}>${t}</option>`).join('');
            }

            const avancos = Math.floor((nex - 5) / 5);
            let pB, pN, eB, eN, sB, sN;
            if (classe === 'combatente') { pB=20+vig; pN=4+vig; eB=2+pre; eN=2+pre; sB=12; sN=3; }
            else if (classe === 'especialista') { pB=16+vig; pN=3+vig; eB=3+pre; eN=3+pre; sB=16; sN=4; }
            else { pB=12+vig; pN=2+vig; eB=4+pre; eN=4+pre; sB=20; sN=5; }

            document.getElementById('max-pv').innerText = pB + (pN * avancos);
            document.getElementById('max-pe').innerText = eB + (eN * avancos);
            document.getElementById('max-san').innerText = sB + (sN * avancos);
            document.getElementById('count-pericias').innerText = (classe === 'especialista' ? 7 : 3) + int;

            const cargaMax = 5 + (forca * 5);
            let cargaAtual = 0;
            document.querySelectorAll('.item-peso').forEach(i => cargaAtual += parseInt(i.value) || 0);
            document.getElementById('carga-max').innerText = cargaMax;
            document.getElementById('carga-atual').innerText = cargaAtual;
            document.getElementById('carga-atual').style.color = cargaAtual > cargaMax ? "red" : "var(--ouro)";

            document.getElementById('secao-rituais').style.display = (classe === 'ocultista') ? 'block' : 'none';
            salvarDados();
        }

        function gerarCheckboxesPericias() {
            const container = document.getElementById('lista-pericias');
            container.innerHTML = PERICIAS_LISTA.map(p => `
                <label class="pericia-item">
                    <input type="checkbox" class="chk-pericia" data-nome="${p}" onchange="salvarDados()"> ${p}
                </label>
            `).join('');
        }

        function addItem(nome = "", peso = 1) {
            const container = document.getElementById('itens-container');
            const div = document.createElement('div');
            div.style.display = "grid";
            div.style.gridTemplateColumns = "3fr 1fr";
            div.style.gap = "5px";
            div.innerHTML = `<input type="text" placeholder="Item" value="${nome}" oninput="salvarDados()">
                             <input type="number" value="${peso}" onchange="atualizarTudo()" class="item-peso">`;
            container.appendChild(div);
            atualizarTudo();
        }

        function salvarDados() {
            if(!personagens[indexAtual]) return;
            const p = personagens[indexAtual];
            p.nome = document.getElementById('nome-agente').value;
            p.nex = document.getElementById('nex').value;
            p.classe = document.getElementById('classe').value;
            p.trilha = document.getElementById('trilha').value;
            p.atributos = {
                for: document.getElementById('for').value, agi: document.getElementById('agi').value,
                int: document.getElementById('int').value, vig: document.getElementById('vig').value,
                pre: document.getElementById('pre').value
            };
            p.statusAtuais = {
                pv: document.getElementById('res-pv').innerText,
                pe: document.getElementById('res-pe').innerText,
                san: document.getElementById('res-san').innerText
            };
            p.pericias = Array.from(document.querySelectorAll('.chk-pericia:checked')).map(c => c.dataset.nome);
            p.rituais = document.getElementById('txt-rituais').value;
            localStorage.setItem('ordem_fichas', JSON.stringify(personagens));
            renderListaPersonagens();
        }

        function carregarPersonagem(idx) {
            indexAtual = idx;
            const p = personagens[idx];
            document.getElementById('nome-agente').value = p.nome || "";
            document.getElementById('nex').value = p.nex || 5;
            document.getElementById('classe').value = p.classe || "combatente";
            document.getElementById('for').value = p.atributos?.for || 1;
            document.getElementById('agi').value = p.atributos?.agi || 1;
            document.getElementById('int').value = p.atributos?.int || 1;
            document.getElementById('vig').value = p.atributos?.vig || 1;
            document.getElementById('pre').value = p.atributos?.pre || 1;
            document.getElementById('txt-rituais').value = p.rituais || "";
            
            atualizarTudo();
            if(p.statusAtuais) {
                document.getElementById('res-pv').innerText = p.statusAtuais.pv;
                document.getElementById('res-pe').innerText = p.statusAtuais.pe;
                document.getElementById('res-san').innerText = p.statusAtuais.san;
            } else {
                document.getElementById('res-pv').innerText = document.getElementById('max-pv').innerText;
                document.getElementById('res-pe').innerText = document.getElementById('max-pe').innerText;
                document.getElementById('res-san').innerText = document.getElementById('max-san').innerText;
            }
            document.querySelectorAll('.chk-pericia').forEach(c => c.checked = p.pericias?.includes(c.dataset.nome));
        }

        function novoPersonagem() {
            personagens.push({ nome: "Novo Agente", nex: 5, classe: "combatente", atributos: {for:1,agi:1,int:1,vig:1,pre:1}, pericias: [] });
            carregarPersonagem(personagens.length - 1);
        }

        function deletarAtual() {
            if(confirm("Apagar agente?")) {
                personagens.splice(indexAtual, 1);
                if(personagens.length === 0) novoPersonagem();
                else carregarPersonagem(0);
            }
        }

        function renderListaPersonagens() {
            const container = document.getElementById('lista-personagens');
            container.innerHTML = personagens.map((p, i) => `
                <div class="btn-personagem ${i===indexAtual?'ativo':''}" onclick="carregarPersonagem(${i})">
                    ${p.nome || 'S/ NOME'} (NEX ${p.nex}%)
                </div>
            `).join('');
        }
    </script>
</body>
</html>
