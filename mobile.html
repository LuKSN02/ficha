<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>S.I.G.O. - Mobile V1.3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com');
        :root { --sangue: #8b0000; --fundo: #0a0a0a; --texto: #d1d1d1; --borda: #333; --ouro: #ffd700; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--fundo); color: var(--texto); font-family: 'Special Elite', monospace; padding: 10px; padding-bottom: 50px; }
        
        #tela-login { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #050505 100%); }
        #dashboard { display: none; }
        
        .container-ficha { width: 100%; background: #121212; border: 1px solid var(--sangue); padding: 15px; box-shadow: 0 0 30px #000; }

        .secao { border: 1px solid var(--borda); padding: 12px; margin-top: 15px; background: #0d0d0d; border-radius: 4px; }
        h3 { color: var(--sangue); font-size: 0.9rem; border-bottom: 1px solid var(--borda); margin-bottom: 10px; text-transform: uppercase; }

        input, select, textarea { width: 100%; background: #000; border: 1px solid var(--borda); color: #fff; padding: 10px; font-family: inherit; margin-bottom: 8px; border-radius: 4px; }
        
        .grid-atributos { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .atrib-box { text-align: center; border: 1px solid var(--borda); padding: 8px; cursor: pointer; }
        .atrib-val { font-size: 1.4rem; border: none; border-bottom: 2px solid var(--sangue); text-align: center; background: transparent; width: 100%; color: white; pointer-events: auto !important; }

        .status-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; background: #000; padding: 12px; border: 1px dashed var(--sangue); margin: 10px 0; }
        .status-item { text-align: center; }
        .status-item label { font-size: 0.6rem; display: block; }
        .status-item span { font-size: 1.4rem; color: var(--sangue); font-weight: bold; display: block; }
        .status-item small { font-size: 0.5rem; color: #666; display: block; }

        .btn-status-mob { background: transparent; border: 1px solid var(--sangue); color: var(--sangue); padding: 8px 0; width: 45%; font-weight: bold; margin-top: 5px; font-size: 0.8rem; }

        #lista-personagens { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; border-bottom: 1px solid var(--sangue); }
        .btn-personagem { background: #1a1a1a; color: #666; border: 1px solid #333; padding: 6px 12px; cursor: pointer; white-space: nowrap; font-size: 0.8rem; }
        .btn-personagem.ativo { border-color: var(--sangue); color: var(--sangue); }

        button { background: transparent; border: 1px solid var(--sangue); color: var(--sangue); padding: 12px; font-family: inherit; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

    <section id="tela-login">
        <div style="background: #121212; padding: 30px; border: 1px solid var(--borda); border-top: 4px solid var(--sangue); text-align: center; width: 90%; max-width: 350px;">
            <h2 style="color: var(--sangue);">ORDO REALITAS</h2>
            <p style="font-size: 0.6rem; letter-spacing: 2px; margin-bottom: 20px;">TERMINAL MOBILE V1.3</p>
            <input type="text" id="user" placeholder="NOME DO AGENTE">
            <button onclick="fazerLogin()">Acessar</button>
        </div>
    </section>

    <section id="dashboard">
        <div class="container-ficha">
            <div id="lista-personagens"></div>
            
            <label>AGENTE</label>
            <input type="text" id="nome-agente" oninput="salvarDados()">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>NEX %</label><input type="number" id="nex" value="5" step="5" onchange="atualizarTudo()"></div>
                <div><label>CLASSE</label>
                    <select id="classe" onchange="atualizarTudo()">
                        <option value="combatente">Combatente</option>
                        <option value="especialista">Especialista</option>
                        <option value="ocultista">Ocultista</option>
                    </select>
                </div>
            </div>

            <!-- CAMPO DE TRILHA ADICIONADO -->
            <div style="margin-top: 5px;"><label>TRILHA</label><select id="trilha" onchange="salvarDados()"></select></div>

            <div class="secao">
                <div class="grid-atributos">
                    <div class="atrib-box" onclick="rolarTeste('FOR')"><label>FOR</label><input type="number" class="atrib-val" id="for" value="1" onchange="atualizarTudo()" onclick="event.stopPropagation()"></div>
                    <div class="atrib-box" onclick="rolarTeste('AGI')"><label>AGI</label><input type="number" class="atrib-val" id="agi" value="1" onchange="atualizarTudo()" onclick="event.stopPropagation()"></div>
                    <div class="atrib-box" onclick="rolarTeste('INT')"><label>INT</label><input type="number" class="atrib-val" id="int" value="1" onchange="atualizarTudo()" onclick="event.stopPropagation()"></div>
                    <div class="atrib-box" onclick="rolarTeste('VIG')"><label>VIG</label><input type="number" class="atrib-val" id="vig" value="1" onchange="atualizarTudo()" onclick="event.stopPropagation()"></div>
                    <div class="atrib-box" onclick="rolarTeste('PRE')"><label>PRE</label><input type="number" class="atrib-val" id="pre" value="1" onchange="atualizarTudo()" onclick="event.stopPropagation()"></div>
                </div>
            </div>

            <div class="status-box">
                <div class="status-item">
                    <label>PV</label><span id="res-pv">0</span>
                    <div style="display: flex; justify-content: center; gap: 2px;">
                        <button class="btn-status-mob" onclick="alterarStatus('pv', -1)">-</button>
                        <button class="btn-status-mob" onclick="alterarStatus('pv', 1)">+</button>
                    </div>
                    <small>MÁX: <span id="max-pv">0</span></small>
                </div>
                <div class="status-item">
                    <label>PE</label><span id="res-pe">0</span>
                    <div style="display: flex; justify-content: center; gap: 2px;">
                        <button class="btn-status-mob" onclick="alterarStatus('pe', -1)">-</button>
                        <button class="btn-status-mob" onclick="alterarStatus('pe', 1)">+</button>
                    </div>
                    <small>MÁX: <span id="max-pe">0</span></small>
                </div>
                <div class="status-item">
                    <label>SAN</label><span id="res-san">0</span>
                    <div style="display: flex; justify-content: center; gap: 2px;">
                        <button class="btn-status-mob" onclick="alterarStatus('san', -1)">-</button>
                        <button class="btn-status-mob" onclick="alterarStatus('san', 1)">+</button>
                    </div>
                    <small>MÁX: <span id="max-san">0</span></small>
                </div>
            </div>
            <button onclick="descansoLongo()" style="border-color: var(--ouro); color: var(--ouro); margin-bottom: 10px;">☕ Descanso Longo</button>

            <div class="secao">
                <div id="log-dados" style="font-size: 0.6rem; color: #666; text-align: center;">AGUARDANDO...</div>
                <div id="resultado-dado" style="font-size: 2rem; color: var(--ouro); font-weight: bold; text-align: center;">0</div>
                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <button onclick="rolarD(20)">D20</button>
                    <button onclick="rolarD(6)">D6</button>
                </div>
            </div>

            <div class="secao">
                <h3>Perícias (<span id="count-pericias">0</span>)</h3>
                <div id="lista-pericias" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;"></div>
            </div>

            <button onclick="novoPersonagem()" style="margin-top: 20px; border-color: #222; color: #555;">+ Novo Agente</button>
            <button onclick="deletarAtual()" style="margin-top: 10px; border-color: #444; color: #444;">Deletar Agente</button>
        </div>
    </section>

    <script>
        const PERICIAS_LISTA = ["Acrobacia", "Adestramento", "Artes", "Atletismo", "Atualidades", "Crime", "Diplomacia", "Enganação", "Fortitude", "Furtividade", "Iniciativa", "Intimidação", "Intuição", "Investigação", "Luta", "Medicina", "Ocultismo", "Percepção", "Pilotagem", "Pontaria", "Profissão", "Reflexos", "Religião", "Sobrevivência", "Tática", "Tecnologia", "Vontade"];
        
        const TRILHAS_DB = {
            combatente: ["Aniquilador", "Comandante", "Guerreiro", "Op. Especiais", "Tropa de Choque"],
            especialista: ["Atirador Elite", "Infiltrador", "Médico Campo", "Negociador", "Técnico"],
            ocultista: ["Conduíte", "Flagelador", "Graduado", "Lâmina", "Intuitivo"]
        };

        let personagens = JSON.parse(localStorage.getItem('ordem_fichas')) || [];
        let indexAtual = 0;

        function fazerLogin() {
            if(document.getElementById('user').value) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                gerarCheckboxesPericias();
                if(personagens.length === 0) novoPersonagem();
                else carregarPersonagem(0);
            }
        }

        function rolarD(lados) {
            const r = Math.floor(Math.random() * lados) + 1;
            document.getElementById('log-dados').innerText = `1D${lados}:`;
            document.getElementById('resultado-dado').innerText = r;
        }

        function rolarTeste(atrib) {
            const val = parseInt(document.getElementById(atrib.toLowerCase()).value) || 0;
            if(val <= 0) {
                let d1 = Math.floor(Math.random() * 20) + 1;
                let d2 = Math.floor(Math.random() * 20) + 1;
                document.getElementById('log-dados').innerText = `TESTE ${atrib} (DEFICIT):`;
                document.getElementById('resultado-dado').innerText = Math.min(d1, d2);
            } else {
                let r = [];
                for(let i=0; i<val; i++) r.push(Math.floor(Math.random() * 20) + 1);
                document.getElementById('log-dados').innerText = `TESTE ${atrib}:`;
                document.getElementById('resultado-dado').innerText = Math.max(...r);
            }
        }

        function alterarStatus(tipo, valor) {
            const span = document.getElementById(`res-${tipo}`);
            let atual = parseInt(span.innerText) || 0;
            span.innerText = Math.max(0, atual + valor);
            salvarDados();
        }

        function descansoLongo() {
            document.getElementById('res-pv').innerText = document.getElementById('max-pv').innerText;
            document.getElementById('res-pe').innerText = document.getElementById('max-pe').innerText;
            document.getElementById('res-san').innerText = document.getElementById('max-san').innerText;
            salvarDados();
        }

        function gerarCheckboxesPericias() {
            const container = document.getElementById('lista-pericias');
            container.innerHTML = PERICIAS_LISTA.map(p => `
                <label class="pericia-item">
                    <input type="checkbox" class="chk-pericia" data-nome="${p}" onchange="salvarDados()"> ${p}
                </label>
            `).join('');
        }

        function atualizarTudo() {
            const classe = document.getElementById('classe').value;
            const nex = parseInt(document.getElementById('nex').value) || 5;
            const vig = parseInt(document.getElementById('vig').value) || 0;
            const pre = parseInt(document.getElementById('pre').value) || 0;
            const int = parseInt(document.getElementById('int').value) || 0;

            // Trilhas
            const selTrilha = document.getElementById('trilha');
            selTrilha.disabled = nex < 10;
            if(nex < 10) {
                selTrilha.innerHTML = "<option>Bloqueado</option>";
            } else {
                const atualT = selTrilha.value;
                selTrilha.innerHTML = TRILHAS_DB[classe].map(t => `<option ${t===atualT?'selected':''}>${t}</option>`).join('');
            }

            const n = Math.floor((nex - 5) / 5);
            let pv, pe, san;
            if(classe==='combatente'){ pv=(20+vig)+(4+vig)*n; pe=(2+pre)+(2+pre)*n; san=12+3*n; }
            else if(classe==='especialista'){ pv=(16+vig)+(3+vig)*n; pe=(3+pre)+(3+pre)*n; san=16+4*n; }
            else { pv=(12+vig)+(2+vig)*n; pe=(4+pre)+(4+pre)*n; san=20+5*n; }

            document.getElementById('max-pv').innerText = pv;
            document.getElementById('max-pe').innerText = pe;
            document.getElementById('max-san').innerText = san;
            document.getElementById('count-pericias').innerText = (classe==='especialista' ? 7 : 3) + int;

            salvarDados();
        }

        function salvarDados() {
            if(!personagens[indexAtual]) return;
            const p = personagens[indexAtual];
            p.nome = document.getElementById('nome-agente').value;
            p.nex = document.getElementById('nex').value;
            p.classe = document.getElementById('classe').value;
            p.trilha = document.getElementById('trilha').value; // Salvando trilha
            p.atributos = {
                for: document.getElementById('for').value, agi: document.getElementById('agi').value,
                int: document.getElementById('int').value, vig: document.getElementById('vig').value,
                pre: document.getElementById('pre').value
            };
            p.statusAtuais = {
                pv: document.getElementById('res-pv').innerText,
                pe: document.getElementById('res-pe').innerText,
                san: document.getElementById('res-san').innerText
            };
            p.pericias = Array.from(document.querySelectorAll('.chk-pericia:checked')).map(c => c.dataset.nome);
            localStorage.setItem('ordem_fichas', JSON.stringify(personagens));
            renderListaPersonagens();
        }

        function carregarPersonagem(idx) {
            indexAtual = idx;
            const p = personagens[idx];
            document.getElementById('nome-agente').value = p.nome || "";
            document.getElementById('nex').value = p.nex || 5;
            document.getElementById('classe').value = p.classe || "combatente";
            
            // Atributos
            document.getElementById('for').value = p.atributos?.for || 1;
            document.getElementById('agi').value = p.atributos?.agi || 1;
            document.getElementById('int').value = p.atributos?.int || 1;
            document.getElementById('vig').value = p.atributos?.vig || 1;
            document.getElementById('pre').value = p.atributos?.pre || 1;
            
            // Rodar atualização para liberar trilha antes de carregar o valor dela
            atualizarTudo();
            document.getElementById('trilha').value = p.trilha || "";
            
            document.querySelectorAll('.chk-pericia').forEach(c => c.checked = p.pericias?.includes(c.dataset.nome));
            
            if(p.statusAtuais) {
                document.getElementById('res-pv').innerText = p.statusAtuais.pv;
                document.getElementById('res-pe').innerText = p.statusAtuais.pe;
                document.getElementById('res-san').innerText = p.statusAtuais.san;
            } else {
                document.getElementById('res-pv').innerText = document.getElementById('max-pv').innerText;
                document.getElementById('res-pe').innerText = document.getElementById('max-pe').innerText;
                document.getElementById('res-san').innerText = document.getElementById('max-san').innerText;
            }
        }

        function novoPersonagem() {
            personagens.push({ nome: "Novo Agente", nex: 5, classe: "combatente", atributos: {for:1,agi:1,int:1,vig:1,pre:1}, pericias: [] });
            carregarPersonagem(personagens.length - 1);
        }

        function deletarAtual() {
            if(confirm("Apagar agente?")) {
                personagens.splice(indexAtual, 1);
                if(personagens.length === 0) novoPersonagem();
                else carregarPersonagem(0);
            }
        }

        function renderListaPersonagens() {
            const container = document.getElementById('lista-personagens');
            container.innerHTML = personagens.map((p, i) => `
                <div class="btn-personagem ${i===indexAtual?'ativo':''}" onclick="carregarPersonagem(${i})">
                    ${p.nome || 'AGENTE'}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
